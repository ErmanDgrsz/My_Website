{% extends 'main/layout.html' %}
{% block content%}
<form method="post" style="border:1px solid #ccc">

    {% csrf_token %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/signup.css' %}">
  <div class="container">
      <h1>Sign Up</h1>
    <p>Please fill in the forms below to create an account</p>
    <hr>
      {{ form.as_p }}

    <label>
      <input type="checkbox" checked="checked" name="remember" style="margin-bottom:15px"> Remember me
    </label>

    <p>By creating an account you agree to our <a href="#" style="color:dodgerblue">Terms & Privacy</a>.</p>


    <a href="{% url 'layout' %}" id="cancel"  class="registerbtn">Cancel</a>
    <button type="submit" class="reqisterbtn">Confirm</button>
  </div>
    <div class="container signin">
    <p>Already have an account? <a href="{% url 'home' %}">Sign in</a>.</p>
  </div>
</form>
{% endblock %}
